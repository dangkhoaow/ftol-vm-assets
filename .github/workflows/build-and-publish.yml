# Builds the Linux Online VM images and publishes them to this repo's
# GitHub Pages site (deploy-from-artifact - the images never enter git).
# Pages is the browser-facing CDN because it sends CORS (ACAO *) + Range;
# GitHub Releases do NOT send CORS headers and cannot be fetched by browsers.
# Failed runs upload their step logs to the vm-assets-debug prerelease.
name: build-and-publish
on:
  push:
    branches: [main]
  workflow_dispatch: {}
permissions:
  contents: write # debug-log release channel
  pages: write
  id-token: write
concurrency:
  group: build-and-publish
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build images (docker linux/386 -> raw ext4 + kernel)
        run: |
          set -o pipefail
          sudo bash scripts/build-image.sh terminal 2>&1 | tee build-terminal.log
          sudo bash scripts/build-image.sh desktop 2>&1 | tee build-desktop.log
          sudo chown -R "$USER" out
      - name: Fetch pinned v86 runtime + BIOS
        working-directory: scripts
        run: |
          npm init -y >/dev/null
          npm i v86@0.5.424 --no-audit --no-fund
          V86_COMMIT=2f1346b0e7d88d4cbbbcc05fe15b4e369c3de23f
          curl -sL -o seabios.bin  "https://raw.githubusercontent.com/copy/v86/$V86_COMMIT/bios/seabios.bin"
          curl -sL -o vgabios.bin "https://raw.githubusercontent.com/copy/v86/$V86_COMMIT/bios/vgabios.bin"
          echo "73e3f359102e3a9982c35fce98eb7cd08f18303ac7f1ba6ebfbe6cdc1c244d98  seabios.bin" | sha256sum -c -
          echo "a4bc0d80cc3ca028c73dafa8fee396b8d054ce87ebd8abfbd31b06b437607880  vgabios.bin" | sha256sum -c -
      - name: Snapshot boot state (terminal)
        working-directory: scripts
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          set -o pipefail
          node snapshot.mjs terminal ../out/terminal 2>&1 | tee ../snapshot-terminal.log
      - name: Snapshot boot state (desktop)
        working-directory: scripts
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          set -o pipefail
          node snapshot.mjs desktop ../out/desktop 2>&1 | tee ../snapshot-desktop.log
      - name: Package + manifest + site index
        run: |
          set -o pipefail
          bash scripts/package-release.sh 2>&1 | tee package.log
          bash scripts/make-index.sh out/release
      - name: Upload step logs on failure (public debug channel)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view vm-assets-debug --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create vm-assets-debug --repo "$GITHUB_REPOSITORY" --prerelease \
              --title "vm-images debug logs" --notes "Step logs from failed runs. Safe to delete."
          for f in build-terminal.log build-desktop.log snapshot-terminal.log snapshot-desktop.log package.log; do
            [ -s "$f" ] && gh release upload vm-assets-debug "$f" --repo "$GITHUB_REPOSITORY" --clobber || true
          done
      - name: Configure Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/release
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
