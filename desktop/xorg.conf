# Linux Online desktop image - Xorg on v86's Bochs-VBE SVGA card.
# The card is DRM/KMS-capable (kernel exposes /sys/.../drm/card0); the
# generic "modesetting" driver talks to that node directly and is built
# into Xorg core (no extra package). The legacy "vesa" driver does
# real-mode BIOS probing that hangs indefinitely under v86 - do not use it.
Section "Device"
    Identifier "Card0"
    Driver "modesetting"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device "Card0"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        Modes "1024x768" "800x600"
    EndSubSection
EndSection
