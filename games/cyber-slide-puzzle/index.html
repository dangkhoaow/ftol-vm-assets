<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A sleek sliding puzzle game built with pure HTML, CSS, and JavaScript. A browser sliding-tile puzzle.">
  <title>Cyber Slide Puzzle</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <h1>🧩 Cyber Slide Puzzle</h1>
  <p class="subtitle">Slide the tiles to solve the puzzle</p>

  <div class="controls">
    <select id="difficulty">
      <option value="3">3×3 Easy</option>
      <option value="4" selected>4×4 Classic</option>
      <option value="5">5×5 Hard</option>
    </select>
    <button onclick="shuffle()">🔀 Shuffle</button>
    <button onclick="resetGame()">🔄 Reset</button>
  </div>

  <div class="stats">
    <div><span>Moves:</span> <strong id="moves">0</strong></div>
    <div><span>Time:</span> <strong id="timer">0:00</strong></div>
    <div><span>Best:</span> <strong id="best">—</strong></div>
  </div>

  <div class="board-container">
    <div class="board" id="board"></div>
  </div>

  <div class="win-overlay" id="winOverlay">
    <h2>🎉 You Win!</h2>
    <p id="winMsg">Solved in 0 moves and 0:00</p>
    <button onclick="closeWin()">Play Again</button>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
