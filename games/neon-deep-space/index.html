<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="robots" content="noindex,nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Deep Space</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

    <div id="ui-layer">
        <!-- HUD -->
        <div class="hud" id="hud" style="display: none;">
            <div class="hud-left">
                <div class="hud-item text-white" id="weapon-mode-display">武器: 脉冲机枪 [F]</div>
                <div class="hud-item text-cyan">得分: <span id="score">0</span></div>
                <div class="hud-item text-red">生命: <span id="health">100</span>%</div>
                <div class="hud-item text-white">移速: <span id="speed-level">LV.1</span></div>
            </div>
            
            <div class="hud-center">
                <button id="mute-btn">静音: OFF</button>
            </div>

            <div class="hud-right" style="text-align: right;">
                <div class="hud-item text-orange">火力等级: <span id="weapon-level">LV.1</span></div>
                <div class="hud-item text-cyan">冲刺: 
                    <span id="dash-text" style="width: 50px; text-align: left; display:inline-block;">就绪</span> 
                    [SHIFT]
                    <div class="cooldown-wrapper" style="margin-left: 5px;">
                        <div id="dash-bar" class="cooldown-bar"></div>
                    </div>
                </div>
                <div class="hud-item text-purple">核弹: <span id="bomb-count">1</span> [SPACE]</div>
                <div class="hud-item text-white">卫星: <span id="orbiter-count">0</span></div>
                <div class="hud-item text-green">额外护盾: <span id="shield-count">0</span></div>
            </div>
        </div>

        <!-- 开始菜单 -->
        <div class="menu-screen" id="start-screen">
            <h1>霓虹深空：几何战争</h1>
            <div class="menu-stats">
                <div class="text-gold">历史最高: <span id="high-score-display">0</span></div>
                <div class="text-energy">当前能量: <span id="energy-display">0</span></div>
            </div>
            
            <p class="subtitle">NEON DEEP SPACE: GEOMETRIC WAR<br>Roguelite</p>
            
            <div style="display: flex; gap: 20px;">
                <button class="btn" id="start-btn">启动引擎</button>
                <button class="btn btn-shop" id="open-shop-btn">改装商店</button>
            </div>

            <div class="controls-hint">
                移动: <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> 
                | 瞄准: <span class="key">鼠标</span> 
                | 射击: <span class="key">左键</span>
                | <br>切换武器: <span class="key">F</span>
                | 冲刺: <span class="key">Shift</span>
                | 核弹: <span class="key">空格</span>
                | 暂停: <span class="key">ESC</span>
                <br>
            </div>
        </div>

        <!-- 商店菜单 -->
        <div class="menu-screen hidden" id="shop-screen">
            <div class="shop-header">
                <div style="font-size: 30px; font-weight: bold; color: #fa0;">改装中心</div>
                <div style="text-align: right;">
                    <div class="text-energy" style="font-size: 24px;">能量: <span id="shop-energy">0</span></div>
                    <button id="close-shop-btn" class="btn btn-shop" style="margin-top: 10px; padding: 5px 20px; font-size: 16px;">返回主菜单</button>
                </div>
            </div>

            <div class="shop-grid" id="shop-grid">
                <!-- 商店物品将通过 JS 动态生成 -->
            </div>

            <!-- 重置存档按钮 -->
            <div style="margin-top: 20px;">
                <button id="reset-save-btn" class="btn btn-danger">重置存档</button>
            </div>
        </div>

        <!-- 游戏结束菜单 -->
        <div class="menu-screen hidden" id="game-over-screen">
            <h1 style="color: #f05; -webkit-text-fill-color: #f05; text-shadow: 0 0 20px #f05;">信号丢失</h1>
            <p class="subtitle">最终得分: <span id="final-score" style="color:#fff; font-weight:bold;">0</span></p>
            <p class="text-energy" style="font-size: 20px;">获得能量: +<span id="energy-gained">0</span></p>
            
            <div style="display: flex; gap: 20px; margin-top: 10px;">
                <button class="btn" id="restart-btn" style="border-color: #f05; color: #f05; box-shadow: 0 0 15px rgba(255, 0, 85, 0.2);">重启系统</button>
                <button class="btn btn-shop" id="return-menu-btn">返回主菜单</button>
            </div>
        </div>

        <!-- 暂停菜单 -->
        <div class="menu-screen hidden" id="pause-menu">
            <h1 style="color: #0ff; -webkit-text-fill-color: #0ff; text-shadow: 0 0 20px #0ff;">系统暂停</h1>
            <p class="subtitle">当前得分: <span id="pause-score" style="color:#fff; font-weight:bold;">0</span></p>
            
            <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 30px; align-items: center;">
                <button class="btn" id="resume-btn" style="border-color: #0f0; color: #0f0; box-shadow: 0 0 15px rgba(0, 255, 0, 0.2); width: 200px;">继续任务</button>
                <button class="btn" id="restart-pause-btn" style="border-color: #f05; color: #f05; box-shadow: 0 0 15px rgba(255, 0, 85, 0.2); width: 200px;">重新开始</button>
                <button class="btn btn-shop" id="return-menu-pause-btn" style="width: 200px;">返回主菜单</button>
            </div>
            
            <p class="controls-hint" style="margin-top: 30px;">按 <span class="key">ESC</span> 键继续游戏</p>
        </div>
    </div>

    <canvas id="gameCanvas" tabindex="0"></canvas>

    <script src="js/constants.js"></script>
    <script src="js/audio/audio.js"></script>
    <script src="js/entities/particle.js"></script>
    <script src="js/entities/star.js"></script>
    <script src="js/entities/powerUp.js"></script>
    <script src="js/entities/orbiter.js"></script>
    <script src="js/entities/asteroid.js"></script>
    <script src="js/entities/bullet.js"></script>
    <script src="js/entities/enemyBullet.js"></script>
    <script src="js/entities/enemy.js"></script>
    <script src="js/entities/boss.js"></script>
    <script src="js/entities/player.js"></script>
    <script src="js/core/gameState.js"></script>
    <script src="js/ui/shop.js"></script>
    <script src="js/ui/pauseMenu.js"></script>
    <script src="js/core/init.js"></script>
    <script src="js/game/gameHUD.js"></script>
    <script src="js/game/gameSpawns.js"></script>
    <script src="js/game/gameEffects.js"></script>
    <script src="js/game/gameLoop.js"></script>
    <script src="js/game/gameOver.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
