<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Crown silhouette in chunky pixel art (matches Crownfall's golden ♛ glyph) -->
  <g fill="#1a0c00">
    <!-- outline -->
    <rect x="1"  y="3" width="1" height="1"/>
    <rect x="7"  y="2" width="1" height="1"/>
    <rect x="13" y="3" width="1" height="1"/>
    <rect x="0"  y="4" width="1" height="6"/>
    <rect x="2"  y="4" width="1" height="2"/>
    <rect x="6"  y="3" width="3" height="1"/>
    <rect x="12" y="4" width="1" height="2"/>
    <rect x="14" y="4" width="1" height="6"/>
    <rect x="3"  y="6" width="1" height="1"/>
    <rect x="11" y="6" width="1" height="1"/>
    <rect x="1"  y="10" width="13" height="1"/>
    <rect x="0"  y="11" width="15" height="1"/>
    <rect x="0"  y="12" width="15" height="1"/>
    <rect x="1"  y="13" width="13" height="1"/>
  </g>
  <g fill="#ffd060">
    <!-- crown body fill -->
    <rect x="1"  y="4" width="1" height="6"/>
    <rect x="2"  y="6" width="1" height="4"/>
    <rect x="3"  y="7" width="3" height="3"/>
    <rect x="6"  y="4" width="3" height="6"/>
    <rect x="9"  y="7" width="3" height="3"/>
    <rect x="12" y="6" width="1" height="4"/>
    <rect x="13" y="4" width="1" height="6"/>
  </g>
  <!-- jewel highlights -->
  <g fill="#c83020">
    <rect x="7" y="6" width="1" height="1"/>
  </g>
  <g fill="#80c8ff">
    <rect x="3" y="8" width="1" height="1"/>
    <rect x="11" y="8" width="1" height="1"/>
  </g>
  <g fill="#fff8e0">
    <rect x="1" y="4" width="1" height="1"/>
    <rect x="6" y="4" width="1" height="1"/>
    <rect x="13" y="4" width="1" height="1"/>
  </g>
  <!-- band shine -->
  <g fill="#fff8c0">
    <rect x="1" y="11" width="13" height="1"/>
  </g>
</svg>
