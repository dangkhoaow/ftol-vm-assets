<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex">
  <title>Classic Pong</title>
  <link href="pong.css" media="screen, print" rel="stylesheet" type="text/css" />
  <style>
    body { margin: 0; background: #111; color: #eee; font-family: sans-serif; }
    #sidebar { padding: 12px 16px; max-width: 720px; margin: 0 auto; }
    #sidebar h2 { margin: 0 0 8px; color: #9fd; }
    #sidebar .parts { display: none; }
    #game { display: block; margin: 8px auto; background: #000; max-width: 100%; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h2>Classic Pong</h2>
    <div class="description">
      <p>Press <b>1</b> for single player, <b>2</b> for two players, <b>0</b> for computer vs computer. Esc abandons a match.</p>
      <p>Player 1: <b>Q</b>/<b>A</b>. Player 2: <b>P</b>/<b>L</b>.</p>
    </div>
  </div>
  <canvas id="game">
    Sorry, this browser does not support HTML5 canvas.
  </canvas>
  <script src="game.js"></script>
  <script src="pong.js"></script>
  <script>
  Game.ready(function () {
    Game.start("game", Pong, { sound: true, stats: false, footprints: false, predictions: false });
  });
  </script>
</body>
</html>
